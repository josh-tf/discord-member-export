<svg xmlns="http://www.w3.org/2000/svg" width="520" height="310" viewBox="0 0 520 310">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5865F2"/>
      <stop offset="1" stop-color="#3C44AA"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="20" cy="20" r="20"/>
    </clipPath>
  </defs>

  <!-- Discord message background -->
  <rect width="520" height="310" rx="8" fill="#313338"/>

  <!-- Bot identity row -->
  <g transform="translate(16, 14)">
    <!-- Bot avatar: scaled version of the actual logo -->
    <g clip-path="url(#avatarClip)">
      <rect width="40" height="40" fill="url(#avatarGrad)"/>
      <g transform="scale(0.2) translate(0, -14)">
        <!-- Back-left person (dimmed) -->
        <circle cx="78" cy="75" r="19" fill="white" opacity="0.45"/>
        <path d="M40 140 Q40 94 78 94 Q116 94 116 140Z" fill="white" opacity="0.45"/>
        <!-- Front-right person -->
        <circle cx="122" cy="68" r="24" fill="white"/>
        <path d="M80 140 Q80 92 122 92 Q164 92 164 140Z" fill="white"/>
        <!-- Export arrow -->
        <g stroke="white" stroke-linecap="round" fill="none" opacity="0.88">
          <line x1="100" y1="156" x2="100" y2="180" stroke-width="6"/>
          <polyline points="88,170 100,184 112,170" stroke-width="6" stroke-linejoin="round"/>
        </g>
      </g>
    </g>

    <!-- Bot name + badge + timestamp -->
    <text x="52" y="16" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#C9CDFB">Member Export</text>
    <rect x="158" y="4" width="32" height="16" rx="3" fill="#5865F2"/>
    <text x="174" y="15" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">APP</text>
    <text x="198" y="15" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="11" fill="#949BA4">Today at 10:00 AM</text>
  </g>

  <!-- Embed card -->
  <g transform="translate(68, 52)">
    <!-- Card bg with left accent -->
    <rect x="0" y="0" width="420" height="240" rx="4" fill="#2B2D31" filter="url(#shadow)"/>
    <rect x="0" y="0" width="4" height="240" rx="2" fill="#5865F2"/>

    <!-- Embed title -->
    <text x="20" y="30" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="15" font-weight="700" fill="#F2F3F5">Exporting Members...</text>

    <!-- Description: inline code progress bar + bold percentage -->
    <g transform="translate(20, 44)">
      <!-- Inline code background -->
      <rect x="0" y="0" width="250" height="22" rx="3" fill="#2F3136"/>
      <!-- Progress bar filled portion -->
      <rect x="4" y="4" width="80" height="14" rx="2" fill="#B5BAC1"/>
      <!-- Progress bar empty portion -->
      <rect x="84" y="4" width="162" height="14" rx="2" fill="#4F545C" opacity="0.4"/>
      <!-- Bold percentage -->
      <text x="260" y="16" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="#F2F3F5">34%</text>
    </g>

    <!-- Fields row 1: Stage | Processed -->
    <g transform="translate(20, 86)">
      <text x="0" y="0" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#B5BAC1">Stage</text>
      <text x="0" y="18" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="13" fill="#DBDEE1">Fetching Members</text>

      <text x="150" y="0" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#B5BAC1">Processed</text>
      <text x="150" y="18" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="13" fill="#DBDEE1">26,800 / 78,823</text>
    </g>

    <!-- Fields row 2: Speed | ETA -->
    <g transform="translate(20, 132)">
      <text x="0" y="0" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#B5BAC1">Speed</text>
      <text x="0" y="18" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="13" fill="#DBDEE1">~1,200 members/s</text>

      <text x="150" y="0" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="11" font-weight="700" fill="#B5BAC1">ETA</text>
      <text x="150" y="18" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="13" fill="#DBDEE1">~43s remaining</text>
    </g>

    <!-- Divider -->
    <line x1="16" y1="180" x2="404" y2="180" stroke="#3F4147" stroke-width="0.5"/>

    <!-- Footer with tiny avatar -->
    <g transform="translate(20, 192)">
      <!-- Tiny author icon: same logo scaled down -->
      <g transform="scale(0.09)">
        <rect width="200" height="200" rx="100" fill="#5865F2"/>
        <g transform="translate(0, -14)">
          <circle cx="78" cy="75" r="19" fill="white" opacity="0.45"/>
          <path d="M40 140 Q40 94 78 94 Q116 94 116 140Z" fill="white" opacity="0.45"/>
          <circle cx="122" cy="68" r="24" fill="white"/>
          <path d="M80 140 Q80 92 122 92 Q164 92 164 140Z" fill="white"/>
          <g stroke="white" stroke-linecap="round" fill="none" opacity="0.88">
            <line x1="100" y1="156" x2="100" y2="180" stroke-width="6"/>
            <polyline points="88,170 100,184 112,170" stroke-width="6" stroke-linejoin="round"/>
          </g>
        </g>
      </g>
      <!-- Footer text -->
      <text x="24" y="13" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="11" fill="#949BA4">Export #1  ·  Today at 10:00 AM</text>
    </g>
  </g>
</svg>